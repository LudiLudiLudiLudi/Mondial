<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>מונדיאל 2026 - עץ הטורניר</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topnav" id="topnav">
    <a data-nav="home">🏠<span class="nav-label"> בית</span></a>
    <a data-nav="bracket">🌳<span class="nav-label"> עץ</span></a>
    <a data-nav="predict">🎯<span class="nav-label"> ניחושים</span></a>
    <a data-nav="results">🏆<span class="nav-label"> תוצאות</span></a>
    <a data-nav="help">❓<span class="nav-label"> עזרה</span></a>
    <a data-nav="back" href="#">↩<span class="nav-label"> חזור</span></a>
    <a data-nav="admin" id="nav-admin" hidden>⚙️<span class="nav-label"> ניהול</span></a>
  </nav>
  <main class="card wide bracket-card" role="main">
    <h1>🌳 עץ הטורניר</h1>
    <p class="kicker">מתעדכן לאורך הטורניר</p>

    <div class="community-bar">
      <span>👥 <strong id="cb-participants">עדיין אין נתונים</strong></span>
      <span>✍️ <strong id="cb-predicted">עדיין אין נתונים</strong></span>
    </div>

    <p class="legend">
      <span>🏆 מנצחת</span>
      <span>🟢 הסתיים</span>
      <span>⚪ טרם שוחק</span>
    </p>

    <section class="ko-section">
      <h2 class="section-head">🏆 שלב הנוקאאוט</h2>
      <p class="section-sub">גלול הצידה לראות את כל השלבים ←</p>
      <div class="bracket-scroll">
        <div class="bracket-grid" id="bracket-grid">
          <p class="loading">טוען את עץ הטורניר…</p>
        </div>
      </div>
      <div class="third-wrap">
        <h3 class="round-title">🥉 המשחק על המקום השלישי</h3>
        <div id="third-place"></div>
      </div>
    </section>

    <section class="groups-section">
      <h2 class="section-head">🟢 שלב הבתים</h2>
      <div class="groups-grid" id="groups-grid"></div>
    </section>

    <p class="footer-note">גרסת ניסיון למשפחה ⚽</p>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
