<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>מונדיאל 2026 - הגדרת מנהלים</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topnav" id="topnav">
    <a data-nav="home">🏠<span class="nav-label"> בית</span></a>
    <a data-nav="bracket">🌳<span class="nav-label"> עץ</span></a>
    <a data-nav="predict">🎯<span class="nav-label"> ניחושים</span></a>

  <main class="card" id="setup-admins" role="main">

    <form id="setup-form">

      <label class="admin-choice"><input type="checkbox" value="דוד דין" checked> דוד דין</label>

      <button type="submit">שמור והמשך</button>
    </form>

    <p class="footer-note">גרסת ניסיון למשפחה ⚽</p>
  </main>
  <script type="module" src="app.js"></script>
