<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>מונדיאל 2026 - בחירת סיסמה</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topnav" id="topnav">
    <a data-nav="home">🏠<span class="nav-label"> בית</span></a>
    <a data-nav="bracket">🌳<span class="nav-label"> עץ</span></a>
    <a data-nav="predict">🎯<span class="nav-label"> ניחושים</span></a>
    <a data-nav="results">🏆<span class="nav-label"> תוצאות</span></a>
    <a data-nav="help">❓<span class="nav-label"> עזרה</span></a>
    <a data-nav="back" href="#">↩<span class="nav-label"> חזור</span></a>
    <a data-nav="admin" id="nav-admin" hidden>⚙️<span class="nav-label"> ניהול</span></a>
  </nav>

  <main class="card" role="main">
    <h1>🔑 בחירת סיסמה</h1>
    <p class="subtitle" id="setpass-sub">אושרת! בחרו סיסמה לכניסות הבאות.</p>

    <form id="setpass-form" novalidate>
      <label for="pass1">בחר סיסמה
        <input id="pass1" type="password" autocomplete="new-password" placeholder="לפחות 6 תווים" required>
      </label>
      <label for="pass2">אשר סיסמה
        <input id="pass2" type="password" autocomplete="new-password" placeholder="שוב, ליתר ביטחון" required>
      </label>

      <p id="error" class="error" role="alert" hidden></p>

      <button type="submit">שמור</button>
    </form>

    <p class="footer-note">גרסת ניסיון למשפחה ⚽</p>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
